name: superpowers-default
description: Superpowers統合ワークフロー（計画 → テスト作成 → 実装 → 並列レビュー → 修正 → 監督 → 完了）

max_steps: 40
initial_step: plan

steps:
  - name: plan
    edit: false
    persona: planner
    knowledge: architecture
    instruction: |
      タスクを分析し、実装計画を立てます。

      **注意:** Previous Response がある場合は差し戻しのため、内容を踏まえて計画を見直してください（replan）。

      ---

      ## モード判定（最初に必ず行う）

      タスク入力に「設計書」「実装計画」「指示書」「仕様書」「設計ドキュメント」等のファイルパスや
      具体的な実装計画が含まれているかを確認する。

      - **計画・指示書が提供されている** → **【検証モード】** へ
      - **提供されていない** → **【計画作成モード】** へ

      ---

      ## 【検証モード】提供された計画・指示書の妥当性検証

      新規の設計・計画は作成しない。提供された計画が実装に値するかを検証する。

      **検証手順:**

      1. **計画・指示書の読み込み**
         提供されたファイルまたは記載内容を Read で確認し、内容全体を把握する。

      2. **コードベースとの整合性確認**
         - 計画が参照しているファイル・モジュール・APIが実際に存在するか確認する
         - 既存の実装パターン（命名規約・アーキテクチャ・型定義）と矛盾していないか確認する
         - 変更の影響範囲に漏れがないか（新規パラメータ追加時の配線箇所など）確認する

      3. **実現可能性・抜け漏れの検証**
         - 技術的に実現可能か（依存関係・制約の確認）
         - テストへの反映が可能か（テスト戦略が明確か）
         - 曖昧な指示や判断が委ねられている箇所を特定する

      4. **検証結果をレポートに記載する**
         - 問題なし: 計画の要点をサマリーとしてレポートに含め、Coderへの引き継ぎメモを付記する
         - 問題あり: 指摘事項を具体的に列挙し、修正が必要な箇所を明示する

      **判断基準:**
      - 軽微な不明点（判断をCoderに委ねられるレベル）→ 問題なしとして進む
      - 実装方針が根本的に不明確・矛盾がある・影響範囲の漏れが致命的 → 問題ありとして差し戻す

      ---

      ## 【計画作成モード】新規実装計画の作成

      **小規模タスクの判断基準（すべて満たす場合のみ小規模）:**
      - 1-2ファイルの変更のみ
      - 設計判断が不要
      - 技術選定が不要

      **中〜大規模タスクの手順（Superpowers統合）:**

      1. **brainstorming スキルを呼び出す（必須）**
         要件の抜け漏れ・エッジケース・設計上の懸念・代替アプローチを洗い出す。

      2. **コード調査・要件分析**
         - タスク指示書の「参照資料」セクションに記載されたファイルを Read/Glob で確認する
         - 既存の実装パターン（ファイル:行）を特定する
         - 要件ごとに「変更要/不要」を判定し、不要の場合は根拠コード箇所を示す
         - 暗黙要求は明示要求から直接導けるものに限定する

      3. **writing-plans スキルを呼び出す（必須）**
         タスクを構造化し、Coder向けの実装ガイドラインを含む計画を作成する。
         ガイドラインには以下を含める:
         - 参照すべき既存実装パターン（ファイル:行）
         - 変更の影響範囲（新規パラメータ追加時は配線が必要な全箇所）
         - このタスクで特に注意すべきアンチパターン

      **小規模タスクの手順:**
      brainstorming / writing-plans を省略し、直接シンプルな実装方針を立てる。
      コード調査（手順2）は省略しない。
    output_contracts:
      report:
        - name: plan.md
          format: plan
    rules:
      - condition: 要件が明確で実装可能（新規計画または検証済みの指示書）
        next: write_tests
      - condition: ユーザーが質問をしている（実装タスクではない）
        next: COMPLETE
      - condition: 要件が不明確、情報不足、または指示書に致命的な問題がある
        next: ABORT
        appendix: |
          確認事項:
          - {質問または指摘事項1}
          - {質問または指摘事項2}

  - name: write_tests
    edit: true
    persona: coder
    policy:
      - coding
      - testing
    knowledge: architecture
    instruction: implement-test
    quality_gates:
      - test-driven-development スキルのプロセスに従い、プロダクションコードを書かずにテストのみ作成すること
      - テストを実行して RED（失敗）状態であることを確認してから完了を宣言すること
      - 既存テストパターン（命名規約・ディレクトリ構成）に従っていること
    output_contracts:
      report:
        - name: test-report.md
          format: test-plan
    rules:
      - condition: テスト作成完了（失敗するテストが書けた）
        next: implement
      - condition: テスト対象が未実装のためテスト作成をスキップする
        next: implement
      - condition: テスト作成を進行できない
        next: plan
      - condition: ユーザーへの確認事項があるためユーザー入力が必要
        next: write_tests
        requires_user_input: true
        interactive_only: true

  - name: implement
    edit: true
    persona: coder
    policy:
      - coding
      - testing
    knowledge: architecture
    session: refresh
    instruction: |
      作成したテストを通過させる実装を行います（TDD の GREEN → REFACTOR フェーズ）。

      Report Directory 内のレポートを一次情報として参照してください。
      情報が競合する場合は Report Directory 内のレポートと実コードを優先してください。

      **Superpowers統合: サブエージェント駆動実装（複雑な実装時は必須）**

      実装が複雑な場合（3ファイル以上の変更、新規モジュール設計、非自明な統合）:
      - `subagent-driven-development` スキルを呼び出し、独立したモジュール実装やリサーチをサブエージェントに委譲する
      - 独立したサブタスクが2つ以上ある場合は `dispatching-parallel-agents` スキルで並列化を検討する

      **実装手順:**

      1. **Scope宣言を作成（実装開始時）**
         変更予定ファイル・推定規模・影響範囲を宣言する。

      2. **GREEN フェーズ**: テストを通過させる最小限の実装を行う

      3. **自己チェック（実装完了前に必ず実行）:**
         - 新しいパラメータ/フィールドを追加した場合、grep で呼び出し元から実際に渡されているか確認
         - リファクタリングで置き換えたコード・エクスポートが残っていないか確認
         - タスク指示書にない機能を追加していないか確認
         - 既存の実装パターン（API呼び出し方式、型定義方式等）と一致しているか確認

      4. **ビルドとテストを実行し、結果を確認する（必須）**

      5. **Superpowers統合: 完了前検証（必須）**
         完了を宣言する前に `verification-before-completion` スキルを呼び出し、
         証拠に基づいて実装が正しいことを確認する。
    output_contracts:
      report:
        - name: 02-coder-scope.md
          format: coder-scope
        - name: 03-coder-decisions.md
          format: coder-decisions
    rules:
      - condition: 実装完了
        next: reviewers
      - condition: 実装未着手（レポートのみ）
        next: reviewers
      - condition: 判断できない、情報不足
        next: reviewers
      - condition: ユーザー入力が必要
        next: implement
        requires_user_input: true
        interactive_only: true

  - name: reviewers
    parallel:
      - name: ai_review
        edit: false
        persona: ai-antipattern-reviewer
        policy:
          - review
          - ai-antipattern
        instruction: ai-review
        output_contracts:
          report:
            - name: 04-ai-review.md
              format: ai-review
        rules:
          - condition: AI特有の問題なし
          - condition: AI特有の問題あり

      - name: arch_review
        edit: false
        persona: architecture-reviewer
        policy: review
        knowledge: architecture
        instruction: review-arch
        output_contracts:
          report:
            - name: 05-architect-review.md
              format: architecture-review
        rules:
          - condition: approved
          - condition: needs_fix

    rules:
      - condition: all("AI特有の問題なし", "approved")
        next: supervise
      - condition: any("AI特有の問題あり", "needs_fix")
        next: fix

  - name: fix
    edit: true
    persona: coder
    policy:
      - coding
      - testing
    knowledge: architecture
    session: refresh
    instruction: |
      並列レビューで指摘された問題点を修正します。

      Report Directory 内のレビューレポートを確認し、指摘事項を修正してください。
      同名レポートは、無印ファイルを最新結果、`{ファイル名}.{タイムスタンプ}` を履歴として扱う。

      **Superpowers統合: 体系的デバッグ（必須）**

      修正作業を開始する前に、サブエージェント（Agent ツール）を起動し、
      そのサブエージェント内で `systematic-debugging` スキルを使わせてください。
      サブエージェントに根本原因の特定・分析を行わせ、報告を受け取ってから修正を実施する。

      **修正の原則:**
      - 指摘の「修正案」が示されている場合はそれに沿った対応を優先し、独自の迂回策を取らない
      - 指摘の対象コードを直接修正する。テストやドキュメントの追加で指摘を回避しない
      - 同一 `family_tag` の潜在箇所を同時に修正する（部分修正で再発させない）

      **完了条件（以下をすべて満たすこと）:**
      - 今回受け取った全指摘（new / reopened）を修正したこと
      - ビルド（型チェック）とテストを実行して成功を確認したこと

      **Superpowers統合: 完了前検証（必須）**
      修正完了を宣言する前に `verification-before-completion` スキルを呼び出し、
      証拠に基づいて修正が正しいことを確認する。
    rules:
      - condition: 修正完了
        next: reviewers
      - condition: 判断できない、情報不足
        next: ABORT

  - name: supervise
    edit: false
    persona: supervisor
    policy: review
    knowledge: architecture
    pass_previous_response: false
    instruction: supervise
    output_contracts:
      report:
        - name: supervisor-validation.md
          format: validation
        - name: summary.md
          format: summary
    rules:
      - condition: すべて問題なし
        next: COMPLETE
      - condition: 要求未達成、テスト失敗、ビルドエラー
        next: plan
