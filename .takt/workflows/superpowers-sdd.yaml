name: superpowers-sdd
description: "taktの堅牢なステートマシンに、superpowersのTDD規律、セキュリティ、ドキュメント同期、そしてClaude Code/taktネイティブの並列レビュー・supervisor品質ゲートを完全融合させた自律型仕様駆動開発ワークフロー。旧 superpowers-default を統合済み。"
max_steps: 50
initial_step: analyze_order

# usage limit 到達時のフォールバックチェーン（config.yaml の設定を上書き）
# primary: claude（Claude Code CLI）/ fallback: codex（rate_limit 到達で即切替）
rate_limit_fallback:
  switch_chain:
    - provider: codex

# ── モデル割り当てポリシー（ロール特性に応じた provider/model 切替）─────────────
# なぜ分けるか: 設計・レビューは「少量の入出力で高度な判断」が要るため最上位モデルを充て、
#               実装・テストは「反復的なオペレーション」であるためコスト効率の高い Sonnet に
#               codex フォールバックを重ねて冗長化する。役割と料金特性を一致させる狙い。
#
#   マクロ判断ロール（高度な設計・判断）:
#     ・設計系（analyze_order / generate_spec）            → claude / claude-opus-4-8 (Opus 4.8)
#     ・レビュー系（review_spec / 並列reviewers / supervise）→ claude / claude-opus-4-8 (Opus 4.8)
#   ※ 当初は設計系に Fable 5 を充てていたが、Fable 5 が利用不可になったため、
#     利用可能な最上位モデル Opus 4.8 に変更した。
#   オペレーティブロール（テスト作成・実装・修正・検証・Git・ドキュメント同期）:
#     ・claude / claude-sonnet-4-6 (Sonnet 4.6) ＋ rate_limit 時 codex へフォールバック
#
# ※ 旧 superpowers-default の強み（並列レビュー ai+arch+coding / output_contracts /
#    supervisor 最終ゲート / RED-GREEN 分離 / 計画・検証モード判定）を本ワークフローへ統合し、
#    superpowers-default は廃止した。bare な facet 名は project→builtin の順で解決される。
# ────────────────────────────────────────────────────────────────────────────

steps:
  - name: analyze_order
    edit: false
    # マクロ判断・設計系: 注文分析と影響範囲の高度な見極めが必要なため Opus（旧 Fable 5、利用不可のため変更）
    provider: claude
    model: claude-opus-4-8
    persona: architect
    knowledge: architecture
    instruction: |
      現在の注文（ユーザーからの要望や order.md）を確認し、既存のコードベースと照らし合わせて
      実装に必要な前提条件、制約事項、影響範囲を分析してください。

      ## モード判定（最初に必ず行う）
      タスク入力に「設計書」「実装計画」「指示書」「仕様書」等のファイルパスや具体的な実装計画が
      含まれているかを確認する。
      - **計画・指示書が提供されている** → 【検証モード】: 新規設計はせず、提供された計画が
        参照ファイル/API の実在・既存パターンとの整合・影響範囲の漏れ・テスト容易性の観点で
        実装に値するかを冷徹に検証する。
      - **提供されていない** → 【計画作成モード】: 後続の generate_spec で仕様策定に進む準備として、
        不明点・既存設計との衝突懸念をリストアップする。

      不明な点や、既存設計と衝突しそうな懸念点があればこの段階で必ずリストアップしてください。
    rules:
      - condition: "注文内容が明確であり、仕様策定（または検証済み計画の実装）に進む準備が整った"
        next: generate_spec
      - condition: "ユーザーが質問をしているだけで、実装タスクではない"
        next: COMPLETE
      - condition: "注文内容に致命的な矛盾や不足があり、人間の介入が必要である"
        next: ABORT
        appendix: |
          確認事項:
          - {質問または指摘事項1}
          - {質問または指摘事項2}

  - name: generate_spec
    edit: true
    # マクロ判断・設計系: 仕様/プラン設計は最も高度な判断を要するため Opus（旧 Fable 5、利用不可のため変更）
    provider: claude
    model: claude-opus-4-8
    persona: architect
    knowledge: architecture
    instruction: |
      分析結果を元に、プロジェクトのドキュメントまたは一時ディレクトリに以下の2つのファイルを
      生成（または更新）してください。

      1. `spec.md`: 実装すべき機能の明確な仕様。正常系だけでなく、データが空・不正入力・システムエラー
         などの異常系の挙動（バリデーション/返却エラー型）と、入力/出力を厳密に定義する。
      2. `plan.md`: 実装手順を限界まで細分化したタスクリスト。各タスクに「どのテストコードで RED を
         確認するか」をセットで明記する。

      **Superpowers統合（中〜大規模時は必須）:**
      - `brainstorming` スキルで要件の抜け漏れ・エッジケース・代替アプローチを洗い出す。
      - `writing-plans` スキルでタスクを構造化し、参照すべき既存実装パターン（ファイル:行）・
        変更の影響範囲（新規パラメータ追加時の配線箇所）・注意すべきアンチパターンを含める。
    output_contracts:
      report:
        - name: plan.md
          format: plan
    rules:
      - condition: "spec.md と plan.md が漏れなく作成・更新された"
        next: review_spec

  - name: review_spec
    edit: false
    # マクロ判断・レビュー系: 仕様の冷徹な検証は批判的判断力が要るため Opus
    provider: claude
    model: claude-opus-4-8
    persona: requirements-reviewer
    policy: review
    knowledge: architecture
    instruction: |
      作成された仕様（spec.md）とプラン（plan.md）の技術的妥当性を、既存コードと照らし合わせて
      冷徹に検証してください。この検証は spec-reviewer サブエージェントを起動して実施してください（必須）。

      特に以下をチェックすること:
      - 要件充足: 注文の要求が spec.md に漏れなく落とし込まれているか
      - 既存ロジックとの衝突がないか
      - テスト容易性（モックが必要な外部依存の隔離戦略が plan.md に明記されているか）
      - 影響範囲の漏れ（新規パラメータ追加時の配線箇所など）

      検証結果として【判定】(PASS / CONDITIONAL PASS / REJECT) を明示してください。
    output_contracts:
      report:
        - name: 01-spec-review.md
          format: requirements-review
    rules:
      - condition: "判定が PASS または CONDITIONAL PASS である"
        next: write_tests
      - condition: "判定が REJECT であり、仕様やプランの再設計が必要である"
        next: generate_spec

  - name: write_tests
    edit: true
    # オペレーティブ: テスト作成（RED）は反復オペレーションのため Sonnet（codex フォールバック）
    provider: claude
    model: claude-sonnet-4-6
    persona: coder
    policy:
      - coding
      - testing
      - superpowers-tdd
    knowledge: architecture
    instruction: write-tests-first
    quality_gates:
      - test-driven-development スキルのプロセスに従い、プロダクションコードを書かずにテストのみ作成すること
      - テストを実行して RED（失敗）状態であることを確認してから完了を宣言すること
      - 既存テストパターン（命名規約・ディレクトリ構成）に従っていること
    output_contracts:
      report:
        - name: test-report.md
          format: test-report
    rules:
      - condition: "テスト作成完了（失敗するテストが書けた）"
        next: implement
      - condition: "テスト対象が未実装のためテスト作成をスキップする"
        next: implement
      - condition: "テスト作成を進行できない"
        next: generate_spec

  - name: implement
    edit: true
    # オペレーティブ: 実装（GREEN/REFACTOR）は反復オペレーションのため Sonnet（codex フォールバック）
    provider: claude
    model: claude-sonnet-4-6
    persona: coder
    policy:
      - coding
      - testing
      - superpowers-tdd
    knowledge: architecture
    session: refresh
    instruction: |
      作成したテストを通過させる実装を行います（TDD の GREEN → REFACTOR フェーズ）。
      THE IRON LAW: RED を確認してからプロダクションコードを書くサイクルを厳守すること。

      Report Directory 内のレポート（plan.md / test-report.md 等）を一次情報として参照してください。
      情報が競合する場合は Report Directory 内のレポートと実コードを優先してください。

      **Superpowers統合: サブエージェント駆動実装（複雑な実装時は必須）**
      3ファイル以上の変更・新規モジュール設計・非自明な統合の場合:
      - `subagent-driven-development` スキルで独立モジュール実装やリサーチをサブエージェントに委譲。
      - 独立サブタスクが2つ以上なら `dispatching-parallel-agents` スキルで並列化を検討。

      **実装手順:**
      1. Scope宣言（変更予定ファイル・推定規模・影響範囲）を作成する。
      2. GREEN: テストを通過させる最小限の実装を行う。
      3. 自己チェック（完了前に必ず）:
         - 新パラメータ/フィールド追加時、grep で呼び出し元から実際に渡されているか確認
         - リファクタで置き換えたコード・エクスポートが残っていないか確認
         - タスク指示書にない機能を追加していないか確認
         - 既存の実装パターン（API呼び出し方式・型定義方式等）と一致しているか確認
      4. ビルドとテストを実行し、結果を確認する（必須）。
      5. 完了宣言の前に `verification-before-completion` スキルで証拠に基づき正しさを確認する。
    output_contracts:
      report:
        - name: 02-coder-scope.md
          format: coder-scope
        - name: 03-coder-decisions.md
          format: coder-decisions
    rules:
      - condition: "実装完了"
        next: reviewers
      - condition: "実装未着手（レポートのみ）"
        next: reviewers
      - condition: "テストがパスしない、または実装中に深刻なバグや設計の破綻が発覚した"
        next: fix

  - name: reviewers
    parallel:
      - name: ai_review
        edit: false
        # マクロ判断・レビュー系: AI特有の手抜き検出は批判的判断力が要るため Opus
        provider: claude
        model: claude-opus-4-8
        persona: ai-antipattern-reviewer
        policy:
          - review
          - ai-antipattern
        instruction: ai-antipattern-review
        output_contracts:
          report:
            - name: 04-ai-review.md
              format: ai-antipattern-review
        rules:
          - condition: AI特有の問題なし
          - condition: AI特有の問題あり

      - name: arch_review
        edit: false
        # マクロ判断・レビュー系: アーキテクチャ検証は高度な設計判断が要るため Opus
        provider: claude
        model: claude-opus-4-8
        persona: architecture-reviewer
        policy: review
        knowledge: architecture
        instruction: review-arch
        output_contracts:
          report:
            - name: 05-architect-review.md
              format: architecture-review
        rules:
          - condition: approved
          - condition: needs_fix

      - name: coding_review
        edit: false
        # マクロ判断・レビュー系: SOLID/クリーンコード/品質の引き上げ判断は高度なため Opus
        provider: claude
        model: claude-opus-4-8
        persona: coding-reviewer
        policy: review
        instruction: review-coding
        output_contracts:
          report:
            - name: 06-coding-review.md
              format: coding-review
        rules:
          - condition: コード品質OK
          - condition: コード品質要修正

    rules:
      - condition: all("AI特有の問題なし", "approved", "コード品質OK")
        next: supervise
      - condition: any("AI特有の問題あり", "needs_fix", "コード品質要修正")
        next: fix

  - name: fix
    edit: true
    # オペレーティブ: レビュー指摘の修正は反復オペレーションのため Sonnet（codex フォールバック）
    provider: claude
    model: claude-sonnet-4-6
    persona: coder
    policy:
      - coding
      - testing
      - superpowers-tdd
    knowledge: architecture
    session: refresh
    instruction: |
      並列レビュー（または supervise / final_verification）で指摘された問題点を修正します。
      その場しのぎの修正（モグラ叩き）は厳禁。systematic-debugging アプローチで根本原因を直す。

      Report Directory 内のレビューレポートを確認し、指摘事項を修正してください。
      同名レポートは、無印ファイルを最新結果、`{ファイル名}.{タイムスタンプ}` を履歴として扱う。

      **Superpowers統合: 体系的デバッグ（必須）**
      修正開始前にサブエージェント（Agent ツール）を起動し、その中で `systematic-debugging` スキルを
      使わせて根本原因の特定・分析を行わせ、報告を受け取ってから修正を実施する。

      **修正の原則:**
      - 指摘に「修正案」がある場合はそれに沿い、独自の迂回策を取らない。
      - 指摘対象コードを直接修正する。テストやドキュメントの追加で指摘を回避しない。
      - 同一 `family_tag` の潜在箇所を同時に修正する（部分修正で再発させない）。

      **完了条件（すべて満たすこと）:**
      - 今回受け取った全指摘（new / reopened）を修正したこと
      - ビルド（型チェック）とテストを実行して成功を確認したこと
      - 完了宣言の前に `verification-before-completion` スキルで証拠に基づき確認したこと
    rules:
      - condition: "修正完了、再レビューの準備ができた"
        next: reviewers
      - condition: "判断できない、情報不足で人間の介入が必要"
        next: ABORT

  - name: supervise
    edit: false
    # マクロ判断・レビュー系: 最終監督（要求達成の総合判定）は高度な判断が要るため Opus
    provider: claude
    model: claude-opus-4-8
    persona: supervisor
    policy: review
    knowledge: architecture
    pass_previous_response: false
    instruction: supervise
    output_contracts:
      report:
        - name: supervisor-validation.md
          format: supervisor-validation
        - name: summary.md
          format: summary
    rules:
      - condition: "すべて問題なし。要求を満たしている"
        next: sync_documentation
      - condition: "要求未達成、テスト失敗、ビルドエラーがあり、実装の修正が必要"
        next: fix

  - name: sync_documentation
    edit: true
    # オペレーティブ: ドキュメント同期は機械的整合作業のため Sonnet（codex フォールバック）
    provider: claude
    model: claude-sonnet-4-6
    policy: documentation-sync
    instruction: |
      今回のコード変更に伴い、README.md、.env.example、あるいはコード内のインラインコメント等に
      変更が必要ないか確認してください。必要であれば、コードと乖離がないようにドキュメントを
      修正・更新してください。
    rules:
      - condition: "ドキュメントの同期が完了した、または更新が不要であることを確認した"
        next: final_verification

  - name: final_verification
    edit: false
    # オペレーティブ: ビルド/全回帰テスト実行はオペレーションのため Sonnet（codex フォールバック）
    provider: claude
    model: claude-sonnet-4-6
    instruction: |
      プロジェクト全体のビルドおよび全テスト（関連するすべての回帰テスト）を実行し、今回の変更によって
      既存機能が壊れていないか（エンバグしていないか）を最終確認してください。
    rules:
      - condition: "プロジェクト全体のビルドとすべてのテストが完全に成功した"
        next: final_git_delivery
      - condition: "全体テストで失敗（デグレード）が検出された"
        next: fix

  - name: final_git_delivery
    edit: true
    # オペレーティブ: Gitコミット/PR生成は定型オペレーションのため Sonnet（codex フォールバック）
    provider: claude
    model: claude-sonnet-4-6
    persona: git-operator
    policy: security-and-privacy
    instruction: |
      1. `git status` と `git diff` を確認し、セキュリティポリシーに従って、不要なデバッグログや
         APIキーのハードコードが混入していないか最終目視をしてください。
      2. 問題がなければ、Conventional Commits に準拠した美しいメッセージでコミットを小分けに作成。
      3. 最後に、人間がレビューするための「Pull Request のタイトルと説明文（Markdown）」を生成し、
         完了報告とともに画面に出力してください。
    rules:
      - condition: "安全確認が完了し、GitコミットとPR説明文の作成が完了した"
        next: COMPLETE
